services:
  postgres:
    image: postgres:18-alpine
    container_name: simple_invoice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - simple_invoice_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simple_invoice_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
    ports:
      - '${APP_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: simple_invoice_frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    depends_on:
      - backend

volumes:
  simple_invoice_postgres_data:
